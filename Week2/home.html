<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favorite Singers</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <div class="container mt-5">
    <h1 class="text-center mb-4">Favorite Singers</h1>

    <div class="row">
      
      <!-- LEFT COLUMN (IMAGE) -->
      <div class="col-sm-4">
        <img src="images/singers.jpg" class="img-fluid rounded">
      </div>

      <!-- RIGHT COLUMN (TABLE) -->
      <div class="col-sm-8">
        <table class="table table-striped table-bordered">
          <thead>
            <tr>
              <th>Singer</th>
              <th>DOB</th>
              <th>Best Songs</th>
            </tr>
          </thead>
          <tbody id="singerTableBody"></tbody>
        </table>
      </div>

    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
